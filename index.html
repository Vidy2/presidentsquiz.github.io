            background: #333;
            color: #fff;
        }
        a, a:visited, a:hover, a:active {
            color: #007BFF;
        }
        .square-container {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            }

            .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 70px;
            animation: orbit-square 25s linear infinite;
            animation-delay: calc(var(--i) * -35s / 44);
            pointer-events: auto;
            }

            @keyframes orbit-square {
                0%   { transform: translate(-50%, -50%) translateX(calc(50vw - 35px)) translateY(calc(-1 * (50vh - 35px))); }
                25%  { transform: translate(-50%, -50%) translateX(calc(50vw - 35px)) translateY(calc(50vh - 35px)); }
                50%  { transform: translate(-50%, -50%) translateX(calc(-1 * (50vw - 35px))) translateY(calc(50vh - 35px)); }
                75%  { transform: translate(-50%, -50%) translateX(calc(-1 * (50vw - 35px))) translateY(calc(-1 * (50vh - 35px))); }
                100% { transform: translate(-50%, -50%) translateX(calc(50vw - 35px)) translateY(calc(-1 * (50vh - 35px))); }
            }
    </style>
