<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Webpage Title (will show on tab) -->
    <title>Presidents Quiz Cool</title>
    <style>
        /* Basic styling for the page */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        nav {
            margin: 1rem 0;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
        }
        section {
            padding: 2rem;
            border-bottom: 1px solid #ddd;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: #fff;
        }
        #presidents-list {
            font-family: monospace;
            white-space: pre;
        }
        .president-row {
            display: flex;
            justify-content: space-between;
        }
        .president-entry {
            width: 45%;
        }
        #input-section {
            margin-top: 2rem;
        }
        #wrong-guesses {
            color: red;
            margin-top: 1rem;
        }
    </style>
    <script src="https://cjrtnc.leaningtech.com/4.3/loader.js"></script>
</head>
<body>

    <section id="project">
        <h2>Presidents Quiz</h2>
        <div id="presidents-list"></div>
        <div id="wrong-guesses"></div>
        <div id="input-section">
            <input type="text" id="president-input" placeholder="Name a president">
            <button id="submit-button">Submit</button>
        </div>
    </section>

    <script>
      (async function () {
        await cheerpjInit();
        cheerpjCreateDisplay(800, 600);
        await cheerpjRunJar("Presidents.jar");
      })();
    </script>
</body>

</html>
