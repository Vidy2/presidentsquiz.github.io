<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.5;
            overflow-x: hidden;
            overflow-y: auto;

            background-image:url('https://t4.ftcdn.net/jpg/00/92/47/85/360_F_92478590_BbuqPZQDFPOOjIbhQajB3oq2z5cfsVZt.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100dvh;
        }

        section {
            text-align: center;
            padding: clamp(1rem, 4vw, 2rem);
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
        }

        textarea {
            display: block;
            margin: 0 auto 1rem auto;
            width: clamp(200px, 80vw, 500px);
            height: clamp(80px, 20vh, 200px);
            padding: 1rem;
            border-radius: 20px;
            border: 3px solid #ccc;
            font-size: clamp(1rem, 3vw, 1.2rem);
            text-align: center;
        }

        button {
            display: block;
            margin: 0 auto;
            padding: 1rem 2rem;
            border-radius: 20px;
            border: 3px solid #ccc;
            font-size: clamp(1rem, 3vw, 1.2rem);
        }

        #status {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: darkgreen;
            margin-top: 1rem;
        }

        .corner-link {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.8);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            font-size: 0.9rem;
            text-decoration: none;
            color: black;
        }

        .pulse {
            animation: pulse 0.2s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            textarea {
                width: 90vw;
            }
        }
    </style>
</head>

<body>

    <section id="about">
        <h1>Review</h1>

        <textarea id="message" placeholder="Feedback here"></textarea>

        <button id="submit">Submit</button>

        <p id="status"></p>
    </section>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyremFCMmi5Qp9mmyL4NYewAxevx7uTFS25khuPMQjKKoFer7hVvJiO6QN8FWRNIyHU/exec";

document.getElementById("submit").addEventListener("click", async () => {
    const btn = document.getElementById("submit");
    const messageInput = document.getElementById("message");
    const status = document.getElementById("status");

    const message = messageInput.value;

    if (!message) return;

    btn.classList.add("pulse");

    setTimeout(() => {
        btn.classList.remove("pulse");
    }, 200);

    try {
        fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ message }),
            headers: {
                "Content-Type": "application/json"
            }
        });

        messageInput.value = "";
        status.textContent = "Submitted";

        setTimeout(() => {
            status.textContent = "";
        }, 3000);

    } catch (error) {
        console.error(error);
        status.textContent = "Error submitting";
    }
});
</script>

    <a href="index.html" class="corner-link">First Page</a>

</body>
</html>
