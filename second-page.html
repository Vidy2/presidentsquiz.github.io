<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>
    <link rel="shortcut icon" type="image/jpg" href="https://upload.wikimedia.org/wikipedia/commons/2/2c/William_Henry_Harrison_crop.jpg">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem 0;
            text-align: center;
        }
        nav {
            margin: 1rem 0;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 1rem;
        }
        section {
            padding: 2rem;
            border-bottom: 1px solid #ddd;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: #333;
            color: #fff;
        }
        .corner-link {
            position: fixed;
            bottom: 0rem;
            right: 0rem;
            background: transparent;
            padding: 3rem 6rem;
            border-radius: 5px;
            text-decoration: none;
            font-size: 30px;
        }
        #status {
            font-size:30;
            color: lightgreen;
        }
    </style>
</head>
<body style ="background-image:url('https://t4.ftcdn.net/jpg/00/92/47/85/360_F_92478590_BbuqPZQDFPOOjIbhQajB3oq2z5cfsVZt.jpg');background-size:cover;background-repeat:no-repeat;display:flow-root;text-decoration:none;">

    <section id="about">
        <h1>Review</h1>
            <input style="padding: 1.5rem; border-radius: 25px; border: 5px solid #ccc; font-size: 20px;" id ="message" type ="text" placeholder = "Feedback here">
            <button id = "submit">Submit</button>
        <p id = "status"></p>
    </section>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyremFCMmi5Qp9mmyL4NYewAxevx7uTFS25khuPMQjKKoFer7hVvJiO6QN8FWRNIyHU/exec";

document.getElementById("submit").addEventListener("click", async () => {
    const messageInput = document.getElementById("message");
    const status = document.getElementById("status");

    const message = messageInput.value;

    if (!message) return;

    try {
        await fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ message }),
            headers: {
                "Content-Type": "application/json"
            }
        });

        messageInput.value = "";
        status.textContent = "Submitted";
        setTimeout(() => {
            status.textContent = "";
        },3000);

    } catch (error) {
        console.error(error);
        status.textContent = "Error submitting";
    }
});
</script>
    <a href = "index.html" class = "corner-link" style="text-align: center;color:lightcyan; border:2px solid darkgray">First Page</a>
</body>

</html>
